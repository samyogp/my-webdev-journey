<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="container">
            <h1>My Website</h1>
            <nav>
                <ul>
                    <li><a href="#main">Home</a></li>
                    <li><a href="#articles">Articles</a></li>
                    <li><a href="#aside">Sidebar</a></li>
                    <li><a href="#footer">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main -->
    <main id="main">
        <div class="container layout">

            <!-- Articles -->
            <section id="articles">
                <h2>Articles</h2>

                <article>
                    <h3>Article 1</h3>
                    <p>Content of first article.</p>
                </article>

                <article>
                    <h3>Article 2</h3>
                    <p>Content of second article.</p>
                </article>
            </section>

            <!-- Aside -->
            <aside id="aside">
                <h2>Sidebar</h2>
                <p>Extra info here.</p>
            </aside>

        </div>
    </main>

    <!-- Footer -->
    <footer id="footer">
        <div class="container">
            <p>&copy; 2026 My Website</p>
        </div>
    </footer>

</body>
</html>
