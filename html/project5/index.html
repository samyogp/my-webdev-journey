<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- create a webpage with all types of ordered list and one unordered list also create a table with headings 
     captions and few rows. one of heading should take at least 3
     columns 
     and also create a contact with me form with relevant details for your resume website 
     and also use iframe to add this video to your page 

    
    -->
    <h1> ordered list </h1>
     <ol type="1">
        <li> python </li>
        <li> c </li>
        <li> java </li>
        <li> c++ </li>
        <li> html</li>
        <li> css  </li>
     </ol>

     <ol type="A">
        <li> python </li>
        <li> c </li>
        <li> java </li>
        <li> c++ </li>
        <li> html</li>
        <li> css  </li>
     </ol>

     <ol type="a">
        <li> python </li>
        <li> c </li>
        <li> java </li>
        <li> c++ </li>
        <li> html</li>
        <li> css  </li>
     </ol>

     <!-- unordered list example -->
     <ul type="disc">
        <li> python </li>
        <li> c </li>
        <li> java </li>
        <li> c++ </li>
        <li> html</li>
        <li> css  </li>
     </ul>

     <!-- table example -->
     <table border="1">
         <caption> student details</caption>
         <tr>
             <th rowspan="3"> name</th>
             <th colspan="2"> marks</th>
         </tr>

         <tr>
             <th> physics</th>
             <th> chemistry</th>

         </tr>

         <tr>
             <td > ram</td>
             <td > 90</td>

         </tr>

         <tr >
             <td > shyam</td>
             <td > 80</td>

         </tr>

     </table>

     <!-- contact form example -->
     <form action="#" method="post">
         <label for="name">Name:</label>
         <input type="text" id="name" name="name" required><br><br>

         <label for="email">Email:</label>
         <input type="email" id="email" name="email" required><br><br>

         <label for="message">Message:</label>
         <textarea id="message" name="message" rows="5" cols="40" required></textarea><br><br>

         <input type="submit" value="Submit">
     </form>
        <!-- iframe example -->
        <iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        

</body>
</html>
