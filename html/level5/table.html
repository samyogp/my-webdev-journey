<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- table example -->

    <table border="2">
        <tr>
            <th> name </th>
            <th> age </th>
            <th> address </th>

        </tr>
        <tr> 
            <td> ram </td>
            <td> 20</td>
            <td> kathmandu </td>

        </tr>
        <tr> 
            <td> samyog </td>
            <td> 19</td>
            <td> okhaldhunga </td>

        </tr>
        <tr>
            <tfoot>
                <td> total </td>
                <td> 39 </td>
                <td> </td>
            </tfoot>
        </tr>
    </table>

    <br> <br> 
    <!-- table examples using colspan and rowspan -->
     <table border="1">
        <tr>
            <th> name </th>
            <th> age </th>
            <th> address </th>

        </tr>
        <tr>
            <td rowspan="1"> ram</td>
            <td rowspan="1"> 20</td>
            <td rowspan="1"> kathmandu</td>

        </tr>
        <tr> 
            <td> </td>
            <td>  </td>
            <td>  </td>
        </tr>
        <tr>
            <td colspan="1"> samyog</td>
            <td colspan="1"> 19</td>
            <td colspan="1"> okhaldhunga</td>
        </tr>
     </table>


</body>
</html>
