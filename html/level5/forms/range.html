<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- range example in html form -->
        <form method="post">
            <label for="range"> select range :  </label>
            <input type="range" id="range" name="range">
            <input type="button" value="submit"> 
        </form>

        <!-- price range example -->
         <form>
            <label for="price"> Select price range: </label>
            <input type="range" id="price" name="price" min="0" max="10000" step="100"
             value="50000000" oninput="this.nextElementSibling.value = this.value">
            <output>50000000</output>


         </form>
</body>
</html>
